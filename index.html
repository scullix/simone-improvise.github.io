<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #e8ff47;
      --text: #f0ede6;
      --muted: #555560;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease both;
    }

    .tag {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: slideUp 0.6s ease 0.2s both;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3.5rem, 12vw, 9rem);
      line-height: 1;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: slideUp 0.7s ease 0.4s both;
    }

    h1 span {
      color: var(--accent);
      display: inline-block;
      animation: pulse 3s ease-in-out 1.2s infinite;
    }

    .sub {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: slideUp 0.7s ease 0.7s both;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      margin: 0 6px;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp  { from { opacity:0; transform: translateY(24px) } to { opacity:1; transform: translateY(0) } }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  </style>
</head>
<body>
  <div class="container">
    <p class="tag"><span class="dot"></span> ma première page github</p>
    <h1>Hello, <span>World</span><span class="cursor"></span></h1>
    <p class="sub">// index.html &mdash; tout commence ici</p>
  </div>
</body>
</html>
